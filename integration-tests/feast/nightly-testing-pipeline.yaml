---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: odh-nightly-test-feast
spec:
  description: |
    Nightly integration test for Feast. Provisions an ephemeral HyperShift cluster,
    deploys feast-operator and feature-server from latest stable images, and runs
    the full e2e + REST API + upgrade test suite.
  params:
    - description: List of components in the group
      name: group-components
      type: string
    - name: oci-artifacts-repo
      default: 'quay.io/opendatahub/odh-ci-artifacts'
      description: The OCI container used to store all test artifacts.
    - name: artifact-browser-url
      default: 'https://app-artifact-browser.apps.rosa.konflux-qe.zmr9.p3.openshiftapps.com'
      description: The OCI container used to store all test artifacts.
    - name: git-repo
      default: 'opendatahub-io/feast'
      description: GitHub repo (owner/name) for commit status reporting.
    - name: git-branch
      default: 'master'
      description: Branch to report status against.
  tasks:
    - name: resolve-images
      description: Resolve latest stable image digests for feast-operator and feature-server
      params:
        - name: COMPONENTS
          value: $(params.group-components)
      taskSpec:
        params:
          - name: COMPONENTS
            description: List of components in the group
        results:
        - name: SNAPSHOT
          description: JSON snapshot of component images
        - name: git-revision
          description: Git revision of the source
        steps:
          - name: resolve
            image: quay.io/konflux-ci/konflux-test:stable
            env:
              - name: COMPONENTS
                value: $(params.COMPONENTS)
            script: |
              #!/bin/bash
              set -e

              # Resolve latest images from quay.io using component map
              # Default to odh-stable tags for nightly
              OPERATOR_IMAGE="quay.io/opendatahub/feast-operator:odh-stable"
              SERVER_IMAGE="quay.io/opendatahub/feature-server:odh-stable"

              # Get digests via skopeo
              OPERATOR_DIGEST=$(skopeo inspect --no-tags "docker://${OPERATOR_IMAGE}" 2>/dev/null | jq -r '.Name + "@" + .Digest') || OPERATOR_DIGEST="${OPERATOR_IMAGE}"
              SERVER_DIGEST=$(skopeo inspect --no-tags "docker://${SERVER_IMAGE}" 2>/dev/null | jq -r '.Name + "@" + .Digest') || SERVER_DIGEST="${SERVER_IMAGE}"

              # Try to get git commit from image labels
              OPERATOR_COMMIT=$(skopeo inspect --no-tags "docker://${OPERATOR_IMAGE}" 2>/dev/null | jq -r '.Labels["io.openshift.build.commit.id"] // .Labels["vcs-ref"] // "master"') || OPERATOR_COMMIT="master"

              echo "Resolved images:"
              echo "  Operator: ${OPERATOR_DIGEST}"
              echo "  Server:   ${SERVER_DIGEST}"
              echo "  Commit:   ${OPERATOR_COMMIT}"

              # Build snapshot JSON (same format as generate-snapshot task output)
              SNAPSHOT=$(jq -n \
                --arg op_img "${OPERATOR_DIGEST}" \
                --arg sv_img "${SERVER_DIGEST}" \
                --arg commit "${OPERATOR_COMMIT}" \
                --arg url "https://github.com/opendatahub-io/feast" \
                '{
                  "odh-feast-operator-ci": {
                    "image": $op_img,
                    "git.commit": $commit,
                    "git.url": $url
                  },
                  "odh-feature-server-ci": {
                    "image": $sv_img,
                    "git.commit": $commit,
                    "git.url": $url
                  }
                }')

              echo "${SNAPSHOT}" | tee "$(results.SNAPSHOT.path)"
              echo -n "${OPERATOR_COMMIT}" > "$(results.git-revision.path)"

    - name: provision-eaas-space
      runAfter:
        - resolve-images
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)

    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      taskSpec:
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
          - name: pick-version
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
            params:
              - name: prefix
                value: "$(steps.get-supported-versions.results.versions[0])."
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: version
                value: "$(steps.pick-version.results.version)"
              - name: instanceType
                value: m5.2xlarge

    - name: deploy-and-test
      workspaces:
      - name: basic-auth
        workspace: git-auth
      runAfter:
        - provision-cluster
      taskSpec:
        volumes:
          - name: credentials
            emptyDir: {}
          - name: test-status
            emptyDir: {}
        workspaces:
          - name: basic-auth
            optional: true
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-cluster.results.clusterName)"
              - name: credentials
                value: credentials
          - name: deploy-and-e2e
            image: quay.io/rhoai/rhoai-task-toolset:go-its
            onError: continue
            computeResources:
              requests:
                memory: "4Gi"
                cpu: "2"
              limits:
                memory: "8Gi"
                cpu: "4"
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: SNAPSHOT
                value: $(tasks.resolve-images.results.SNAPSHOT)
            workingDir: /workspace/source
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: test-status
                mountPath: /test-status
            script: |
              STATUS_FILE="/test-status/deploy-and-e2e-status"
              echo "failed" > "$STATUS_FILE"

              # Configure KUBECONFIG
              export KUBECONFIG
              echo "KUBECONFIG=${KUBECONFIG}"
              export HOME="${HOME:-/tmp}"
              mkdir -p "$HOME/.kube"
              cp "${KUBECONFIG%%:*}" "$HOME/.kube/config"

              oc get pods
              oc whoami

              echo "=== NIGHTLY TEST RUN ==="
              echo "SNAPSHOT=${SNAPSHOT}"

              COMPONENT_NAME=odh-feast-operator-ci
              FEAST_OPERATOR_CONTROLLER_IMAGE=$(jq -r --arg cn "${COMPONENT_NAME}" '.[$cn].image' <<< "${SNAPSHOT}")
              GIT_COMMIT=$(jq -r --arg cn "${COMPONENT_NAME}" '.[$cn]."git.commit"' <<< "${SNAPSHOT}")
              GIT_URL=$(jq -r --arg cn "${COMPONENT_NAME}" '.[$cn]."git.url"' <<< "${SNAPSHOT}")
              echo "  FEAST_OPERATOR_CONTROLLER_IMAGE: ${FEAST_OPERATOR_CONTROLLER_IMAGE}"

              COMPONENT_NAME=odh-feature-server-ci
              FEAST_FEATURE_SERVER_IMAGE=$(jq -r --arg cn "${COMPONENT_NAME}" '.[$cn].image' <<< "${SNAPSHOT}")
              echo "  FEAST_FEATURE_SERVER_IMAGE: ${FEAST_FEATURE_SERVER_IMAGE}"

              REPO_URL=${GIT_URL}
              REVISION=${GIT_COMMIT}

              echo "REPO_URL=${REPO_URL}"
              echo "REVISION=${REVISION}"
              git clone "${REPO_URL}" src_code
              cd src_code
              git checkout ${REVISION}

              export RUN_ON_OPENSHIFT_CI=true

              echo "=== Feature Store Operator E2E ==="
              cd infra/feast-operator
              make install && make deploy IMG=${FEAST_OPERATOR_CONTROLLER_IMAGE} FS_IMG=${FEAST_FEATURE_SERVER_IMAGE}
              oc wait --for condition=Available -n feast-operator-system deployment feast-operator-controller-manager
              make test-e2e

              cd ../..
              echo "=== Registry REST API Tests ==="
              make install-python-dependencies-ci
              uv run pytest -c sdk/python/pytest.ini sdk/python/tests/integration/rest_api/test_registry_rest_api.py --integration -s --timeout=600

              cd infra/feast-operator
              make undeploy IMG=${FEAST_OPERATOR_CONTROLLER_IMAGE} FS_IMG=${FEAST_FEATURE_SERVER_IMAGE}

              echo "=== Previous Version Compatibility ==="
              make test-previous-version
              oc delete deployment feast-operator-controller-manager -n feast-operator-system

              echo "=== Upgrade Test ==="
              make test-upgrade

              echo "success" > "$STATUS_FILE"

          - name: must-gather
            onError: continue
            image: quay.io/rhoai/rhoai-task-toolset:go-its
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: ARTIFACT_DIR
                value: /workspace/artifacts-dir
            workingDir: /workspace/source
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            script: |
              # feast-must-gather
              mkdir -p "${ARTIFACT_DIR}/gather-feast"
              oc adm must-gather --image=quay.io/modh/must-gather:rhoai-2.24 --dest-dir "${ARTIFACT_DIR}/gather-feast" -- "export COMPONENT=feastoperator; /usr/bin/gather"

              # openshift-must-gather
              mkdir -p "${ARTIFACT_DIR}/gather-openshift"
              oc adm must-gather --dest-dir "${ARTIFACT_DIR}/gather-openshift"

          - name: git-push-artifacts
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/secure-git-push/0.1/secure-git-push.yaml
            params:
              - name: source-path
                value: /workspace/artifacts-dir
              - name: repo-path
                value: 'opendatahub-io/odh-build-metadata'
              - name: repo-branch
                value: 'ci-artifacts'
              - name: sparse-file-path
                value: 'test-artifacts/docs'
              - name: dest-path
                value: 'test-artifacts/$(context.pipelineRun.name)'
              - name: pipelinerun-name
                value: $(context.pipelineRun.name)

          - name: fail-if-needed
            image: alpine
            volumeMounts:
              - name: test-status
                mountPath: /test-status
            script: |
              STATUS_FILE="/test-status/deploy-and-e2e-status"
              if ! [ -f "$STATUS_FILE" ] || [ "$(cat "$STATUS_FILE")" != "success" ]; then
                echo "Failing pipeline because deploy-and-e2e step failed"
                exit 1
              fi
              echo "All nightly tests passed"

  finally:
  - name: report-nightly-status
    params:
      - name: pipeline-status
        value: $(tasks.status)
      - name: git-repo
        value: $(params.git-repo)
      - name: git-branch
        value: $(params.git-branch)
      - name: git-revision
        value: $(tasks.resolve-images.results.git-revision)
      - name: oci-artifacts-repo
        value: $(params.oci-artifacts-repo)
      - name: artifact-browser-url
        value: $(params.artifact-browser-url)
    workspaces:
    - name: basic-auth
      workspace: git-auth
    taskSpec:
      params:
        - name: pipeline-status
          type: string
        - name: git-repo
          type: string
        - name: git-branch
          type: string
        - name: git-revision
          type: string
        - name: oci-artifacts-repo
          type: string
        - name: artifact-browser-url
          type: string
      workspaces:
        - name: basic-auth
          optional: true
      steps:
        - name: set-commit-status
          image: quay.io/konflux-ci/konflux-test:stable
          env:
            - name: PIPELINE_STATUS
              value: $(params.pipeline-status)
            - name: GIT_REPO
              value: $(params.git-repo)
            - name: GIT_BRANCH
              value: $(params.git-branch)
            - name: GIT_REVISION
              value: $(params.git-revision)
            - name: PIPELINERUN_NAME
              value: $(context.pipelineRun.name)
            - name: OCI_REPO
              value: $(params.oci-artifacts-repo)
            - name: ARTIFACT_BROWSER_URL
              value: $(params.artifact-browser-url)
          script: |
            #!/bin/bash
            set -e

            # Extract GitHub token from workspace git credentials
            GITHUB_TOKEN=""
            if [ -f "$(workspaces.basic-auth.path)/.git-credentials" ]; then
              GITHUB_TOKEN=$(grep github.com "$(workspaces.basic-auth.path)/.git-credentials" | sed 's|.*://||;s|@.*||;s|.*:||')
            elif [ -f "$(workspaces.basic-auth.path)/token" ]; then
              GITHUB_TOKEN=$(cat "$(workspaces.basic-auth.path)/token")
            fi

            if [ -z "$GITHUB_TOKEN" ]; then
              echo "WARNING: No GitHub token found, skipping commit status"
              exit 0
            fi

            # Resolve branch HEAD SHA
            SHA=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${GIT_REPO}/git/ref/heads/${GIT_BRANCH}" \
              | jq -r '.object.sha // empty')

            if [ -z "$SHA" ]; then
              echo "WARNING: Could not resolve SHA for ${GIT_REPO}@${GIT_BRANCH}, using git-revision"
              SHA="${GIT_REVISION}"
            fi

            echo "Reporting status for ${GIT_REPO}@${SHA}"

            # Determine state
            if [ "$PIPELINE_STATUS" == "Succeeded" ]; then
              STATE="success"
              DESCRIPTION="Nightly tests passed"
            else
              STATE="failure"
              DESCRIPTION="Nightly tests failed"
            fi

            ARTIFACT_URL="${ARTIFACT_BROWSER_URL}/?image=${OCI_REPO}:${PIPELINERUN_NAME}"

            # Set commit status on the branch HEAD
            curl -s -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${GIT_REPO}/statuses/${SHA}" \
              -d "$(jq -n \
                --arg state "$STATE" \
                --arg url "$ARTIFACT_URL" \
                --arg desc "$DESCRIPTION" \
                --arg ctx "feast-nightly-test" \
                '{state: $state, target_url: $url, description: $desc, context: $ctx}')" \
              | jq '{state, target_url, context}'

            echo "Commit status set: ${STATE}"

            # On failure, create a GitHub issue for visibility
            if [ "$STATE" == "failure" ]; then
              DATE=$(date -u +"%Y-%m-%d")
              ISSUE_TITLE="Nightly test failure: ${DATE}"

              # Check if issue already exists today
              EXISTING=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
                "https://api.github.com/repos/${GIT_REPO}/issues?labels=nightly-failure&state=open&per_page=5" \
                | jq -r --arg title "$ISSUE_TITLE" '.[] | select(.title == $title) | .number')

              if [ -n "$EXISTING" ]; then
                echo "Issue #${EXISTING} already exists for today, adding comment"
                curl -s -X POST \
                  -H "Authorization: token ${GITHUB_TOKEN}" \
                  "https://api.github.com/repos/${GIT_REPO}/issues/${EXISTING}/comments" \
                  -d "$(jq -n --arg body "Re-run also failed: [Artifacts](${ARTIFACT_URL}) | PipelineRun: \`${PIPELINERUN_NAME}\`" '{body: $body}')" \
                  | jq '{id, created_at}'
              else
                echo "Creating new issue for nightly failure"
                curl -s -X POST \
                  -H "Authorization: token ${GITHUB_TOKEN}" \
                  "https://api.github.com/repos/${GIT_REPO}/issues" \
                  -d "$(jq -n \
                    --arg title "$ISSUE_TITLE" \
                    --arg body "## Nightly Test Failure\n\n**Date:** ${DATE}\n**Branch:** ${GIT_BRANCH}\n**Commit:** ${SHA}\n**PipelineRun:** \`${PIPELINERUN_NAME}\`\n\n**Artifacts:** [View test artifacts](${ARTIFACT_URL})\n\nThe scheduled nightly integration test failed. Check the artifacts link above for must-gather and test logs.\n\ncc @${GIT_REPO%%/*}" \
                    --argjson labels '["nightly-failure","ci"]' \
                    '{title: $title, body: $body, labels: $labels}')" \
                  | jq '{number, html_url}'
              fi
            fi

  - name: push-ci-artifacts
    params:
      - name: oci-artifacts-repo
        value: $(params.oci-artifacts-repo)
      - name: pipeline-status
        value: $(tasks.status)
    taskSpec:
      volumes:
        - name: odh-registry-secret-volume
          secret:
            secretName: odh-registry-secret
            items:
            - key: .dockerconfigjson
              path: oci-storage-dockerconfigjson
      params:
        - name: oci-artifacts-repo
          description: oci-artifacts-repo
        - name: pipeline-status
          type: string
      steps:
        - name: pull-ci-artifacts
          ref:
            resolver: git
            params:
              - name: url
                value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
              - name: revision
                value: main
              - name: pathInRepo
                value: stepactions/git-clone/0.1/git-clone.yaml
          params:
            - name: repo-path
              value: 'opendatahub-io/odh-build-metadata'
            - name: repo-branch
              value: 'ci-artifacts'
            - name: sparse-file-path
              value: 'test-artifacts/$(context.pipelineRun.name)'
            - name: dest-path
              value: /workspace/odh-ci-artifacts
            - name: artifacts-dir-path
              value: 'test-artifacts/$(context.pipelineRun.name)'
        - name: secure-push-oci
          ref:
            resolver: git
            params:
              - name: url
                value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
              - name: revision
                value: main
              - name: pathInRepo
                value: stepactions/secure-push-oci/0.1/secure-push-oci.yaml
          params:
            - name: workdir-path
              value: '/workspace/odh-ci-artifacts/test-artifacts/$(context.pipelineRun.name)'
            - name: oci-ref
              value: $(params.oci-artifacts-repo):$(context.pipelineRun.name)
            - name: credentials-volume-name
              value: odh-registry-secret-volume
        - name: cleanup-artifacts-from-git
          ref:
            resolver: git
            params:
              - name: url
                value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
              - name: revision
                value: main
              - name: pathInRepo
                value: stepactions/cleanup-git-repo/0.1/cleanup-git-repo.yaml
          params:
            - name: work-dir
              value: '/workspace/odh-ci-artifacts'
            - name: artifacts-dir-path
              value: 'test-artifacts'
            - name: dir-to-be-deleted
              value: '$(context.pipelineRun.name)'

  workspaces:
  - name: git-auth
    optional: true
